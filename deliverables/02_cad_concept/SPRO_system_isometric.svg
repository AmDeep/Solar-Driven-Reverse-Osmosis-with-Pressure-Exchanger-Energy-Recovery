<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560">
<title>SPRO System — Isometric View</title>
<rect width="900" height="560" fill="#f8f9fa"/>
<rect x="8" y="8" width="884" height="544" fill="none" stroke="#333" stroke-width="1.5"/>

<!-- Title block -->
<rect x="8" y="498" width="884" height="54" fill="#2c3e50" stroke="#333"/>
<text x="450" y="520" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">ARCHMEDIS TECHNICAL TRIAL — ROUND 2 | SOLAR SPRO SYSTEM | ISOMETRIC VIEW</text>
<text x="450" y="538" text-anchor="middle" font-family="Arial" font-size="10" fill="#bdc3c7">Scale: NTS | All dims in metres | June 2026 | DWG: ARCH-R2-ISO-001 Rev A</text>
<text x="20" y="550" font-family="Arial" font-size="8" fill="#7f8c8d">Design basis: 20,000 L/day freshwater | 35 g/L seawater | 45% recovery | 60 bar RO | 3.5 kWh/m3 SEC (with PX)</text>

<!-- Ground plane grid -->
<g stroke="#e0e6ed" stroke-width="0.4" fill="none">
  <line x1="80" y1="380" x2="560" y2="215"/>
  <line x1="130" y1="407" x2="610" y2="242"/>
  <line x1="180" y1="434" x2="660" y2="269"/>
  <line x1="230" y1="461" x2="710" y2="296"/>
  <line x1="280" y1="488" x2="760" y2="323"/>
  <line x1="80" y1="380" x2="330" y2="516"/>
  <line x1="180" y1="340" x2="430" y2="476"/>
  <line x1="280" y1="300" x2="530" y2="436"/>
  <line x1="380" y1="260" x2="630" y2="396"/>
  <line x1="480" y1="220" x2="730" y2="356"/>
  <line x1="580" y1="180" x2="830" y2="316"/>
</g>

<!-- === CONTAINER OUTLINE === -->
<polygon points="80,380 660,380 760,323 180,323" fill="none" stroke="#1a3a6b" stroke-width="2" stroke-dasharray="8,4"/>
<!-- container sides -->
<line x1="80" y1="380" x2="80" y2="230" stroke="#1a3a6b" stroke-width="1.5" stroke-dasharray="6,3"/>
<line x1="660" y1="380" x2="660" y2="230" stroke="#1a3a6b" stroke-width="1.5" stroke-dasharray="6,3"/>
<line x1="80" y1="230" x2="660" y2="230" stroke="#1a3a6b" stroke-width="1.5" stroke-dasharray="6,3"/>
<text x="370" y="220" text-anchor="middle" font-family="Arial" font-size="9" fill="#1a3a6b">ISO 20 ft CONTAINER — 6.06 × 2.44 × 2.59 m</text>

<!-- === SOLAR PANELS (on roof) === -->
<g fill="#1e3a6b" stroke="#2980b9" stroke-width="0.8">
  <rect x="95" y="148" width="55" height="38" rx="2"/>
  <rect x="158" y="141" width="55" height="38" rx="2"/>
  <rect x="221" y="134" width="55" height="38" rx="2"/>
  <rect x="284" y="127" width="55" height="38" rx="2"/>
  <rect x="347" y="120" width="55" height="38" rx="2"/>
  <rect x="410" y="113" width="55" height="38" rx="2"/>
  <rect x="473" y="106" width="55" height="38" rx="2"/>
  <rect x="95" y="108" width="55" height="35" rx="2"/>
  <rect x="158" y="101" width="55" height="35" rx="2"/>
  <rect x="221" y="94" width="55" height="35" rx="2"/>
  <rect x="284" y="87" width="55" height="35" rx="2"/>
  <rect x="347" y="80" width="55" height="35" rx="2"/>
  <rect x="410" y="73" width="55" height="35" rx="2"/>
  <rect x="473" y="66" width="55" height="35" rx="2"/>
</g>
<text x="290" y="60" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#e67e22">PV ARRAY — 28 panels on roof (37 total incl. ground mount)</text>
<text x="290" y="72" text-anchor="middle" font-family="Arial" font-size="8" fill="#e67e22">14.8 kWp | 21% STC | 72.9 m² total</text>

<!-- === LFP BATTERY BANK (rear) === -->
<polygon points="540,230 660,230 660,380 540,380" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
<polygon points="540,230 640,185 760,185 660,230" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5"/>
<polygon points="660,230 760,185 760,335 660,380" fill="#a5d6a7" stroke="#2e7d32" stroke-width="1.5"/>
<!-- Battery cells -->
<g fill="#4caf50" stroke="#2e7d32" stroke-width="0.8">
  <rect x="555" y="245" width="55" height="85" rx="2"/>
  <rect x="618" y="245" width="55" height="85" rx="2"/>
  <rect x="555" y="340" width="55" height="30" rx="2"/>
  <rect x="618" y="340" width="55" height="30" rx="2"/>
</g>
<text x="600" y="300" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold" fill="#1b5e20">LFP</text>
<text x="600" y="313" text-anchor="middle" font-family="Arial" font-size="9" fill="#1b5e20">BAT-01</text>
<text x="600" y="326" text-anchor="middle" font-family="Arial" font-size="8" fill="#2e7d32">87.5 kWh</text>
<text x="600" y="338" text-anchor="middle" font-family="Arial" font-size="7.5" fill="#2e7d32">1-day autonomy</text>

<!-- === UF PRE-TREATMENT === -->
<rect x="108" y="310" width="28" height="65" fill="#e8eaf6" stroke="#5c35cc" stroke-width="1.5" rx="3"/>
<text x="122" y="368" text-anchor="middle" font-family="Arial" font-size="7.5" font-weight="bold" fill="#4527a0">F-01</text>
<text x="122" y="378" text-anchor="middle" font-family="Arial" font-size="7" fill="#4527a0">UF</text>
<line x1="122" y1="295" x2="122" y2="310" stroke="#5c35cc" stroke-width="0.8" stroke-dasharray="3,2"/>
<rect x="107" y="282" width="28" height="13" fill="white" stroke="#5c35cc" stroke-width="0.8" rx="2"/>
<text x="121" y="292" text-anchor="middle" font-family="Arial" font-size="7" fill="#4527a0">PT-01</text>

<!-- === HP PUMP === -->
<ellipse cx="195" cy="348" rx="28" ry="20" fill="#ffebee" stroke="#c62828" stroke-width="2"/>
<text x="195" y="344" text-anchor="middle" font-family="Arial" font-size="8" font-weight="bold" fill="#c62828">P-02</text>
<text x="195" y="357" text-anchor="middle" font-family="Arial" font-size="7" fill="#c62828">60 bar</text>
<text x="195" y="379" text-anchor="middle" font-family="Arial" font-size="7" fill="#c62828">HP PUMP</text>

<!-- === PX DEVICE === -->
<rect x="250" y="355" width="55" height="38" fill="#e3f2fd" stroke="#0277bd" stroke-width="1.5" stroke-dasharray="5,2" rx="4"/>
<text x="277" y="371" text-anchor="middle" font-family="Arial" font-size="7.5" font-weight="bold" fill="#01579b">E-01</text>
<text x="277" y="382" text-anchor="middle" font-family="Arial" font-size="7" fill="#01579b">PX η=96%</text>

<!-- === RO VESSEL (main, horizontal elongated) === -->
<rect x="330" y="318" width="190" height="42" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" rx="8"/>
<!-- End caps -->
<ellipse cx="330" cy="339" rx="10" ry="21" fill="#1565c0" stroke="#0d47a1" stroke-width="1"/>
<ellipse cx="520" cy="339" rx="10" ry="21" fill="#1565c0" stroke="#0d47a1" stroke-width="1"/>
<!-- Element dividers -->
<line x1="362" y1="318" x2="362" y2="360" stroke="#1565c0" stroke-width="0.8"/>
<line x1="394" y1="318" x2="394" y2="360" stroke="#1565c0" stroke-width="0.8"/>
<line x1="426" y1="318" x2="426" y2="360" stroke="#1565c0" stroke-width="0.8"/>
<line x1="458" y1="318" x2="458" y2="360" stroke="#1565c0" stroke-width="0.8"/>
<line x1="490" y1="318" x2="490" y2="360" stroke="#1565c0" stroke-width="0.8"/>
<text x="425" y="335" text-anchor="middle" font-family="Arial" font-size="8.5" font-weight="bold" fill="#0d47a1">V-01 — RO PRESSURE VESSEL</text>
<text x="425" y="347" text-anchor="middle" font-family="Arial" font-size="7.5" fill="#1565c0">6 × Filmtec SW30XHR-400i | 223 m² | 99.75% rejection</text>
<text x="425" y="358" text-anchor="middle" font-family="Arial" font-size="7" fill="#1565c0">J = 20 L/(m²·h) | CP = 1.49 | NDP = 17.7 bar</text>
<!-- Connection ports -->
<rect x="415" y="305" width="20" height="13" fill="#0277bd" stroke="#01579b" rx="2"/>
<text x="425" y="315" text-anchor="middle" font-family="Arial" font-size="6.5" fill="white">PERM.</text>

<!-- === PERMEATE TANK === -->
<rect x="525" y="315" width="35" height="62" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" rx="4"/>
<text x="542" y="340" text-anchor="middle" font-family="Arial" font-size="7.5" font-weight="bold" fill="#1b5e20">T-01</text>
<text x="542" y="352" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">PERM.</text>
<text x="542" y="363" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">20,000</text>
<text x="542" y="374" text-anchor="middle" font-family="Arial" font-size="7" fill="#2e7d32">L/day</text>

<!-- === PROCESS SKID FRAME === -->
<line x1="100" y1="385" x2="540" y2="385" stroke="#607d8b" stroke-width="2"/>
<line x1="100" y1="395" x2="540" y2="395" stroke="#607d8b" stroke-width="1" stroke-dasharray="4,3"/>

<!-- === FLOW LINES === -->
<!-- Seawater in -->
<line x1="40" y1="345" x2="108" y2="345" stroke="#1565c0" stroke-width="2.5" marker-end="url(#arC)"/>
<text x="70" y="340" text-anchor="middle" font-family="Arial" font-size="7.5" fill="#1565c0">SW in</text>
<text x="70" y="350" text-anchor="middle" font-family="Arial" font-size="7" fill="#1565c0">44.4 m³/d</text>
<!-- UF → HP pump -->
<line x1="136" y1="345" x2="167" y2="345" stroke="#1565c0" stroke-width="2" marker-end="url(#arC)"/>
<!-- HP pump → PX/RO -->
<line x1="223" y1="345" x2="250" y2="370" stroke="#1565c0" stroke-width="1.5"/>
<line x1="305" y1="375" x2="330" y2="345" stroke="#1565c0" stroke-width="2.5" marker-end="url(#arC)"/>
<rect x="295" y="335" width="32" height="12" fill="#c62828"/>
<text x="311" y="344" text-anchor="middle" font-family="Arial" font-size="6.5" fill="white">60 bar</text>
<!-- Permeate out -->
<line x1="520" y1="335" x2="525" y2="335" stroke="#2e7d32" stroke-width="2" marker-end="url(#arG)"/>
<!-- Brine to PX -->
<line x1="520" y1="348" x2="530" y2="348" stroke="#e67e22" stroke-width="1.5"/>
<line x1="530" y1="348" x2="530" y2="393" stroke="#e67e22" stroke-width="1.5"/>
<line x1="530" y1="393" x2="305" y2="393" stroke="#e67e22" stroke-width="1.5" marker-end="url(#arB)"/>
<text x="420" y="407" text-anchor="middle" font-family="Arial" font-size="7" fill="#e67e22">brine 24,400 L/d at 63.6 g/L → PX energy recovery</text>
<!-- PX to HP suction -->
<line x1="250" y1="393" x2="215" y2="393" stroke="#1565c0" stroke-width="1.2"/>
<line x1="215" y1="393" x2="215" y2="368" stroke="#1565c0" stroke-width="1.2" marker-end="url(#arC)"/>
<!-- Electrical -->
<line x1="290" y1="140" x2="290" y2="420" stroke="#f39c12" stroke-width="1" stroke-dasharray="5,3"/>
<line x1="290" y1="420" x2="195" y2="420" stroke="#f39c12" stroke-width="1" stroke-dasharray="5,3"/>
<line x1="195" y1="420" x2="195" y2="368" stroke="#f39c12" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arY)"/>
<text x="245" y="434" text-anchor="middle" font-family="Arial" font-size="7.5" fill="#e67e22">DC power: 70 kWh/day to HP pump</text>

<!-- Markers -->
<defs>
  <marker id="arC" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
    <path d="M0,0 L8,4 L0,8 z" fill="#1565c0"/>
  </marker>
  <marker id="arG" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
    <path d="M0,0 L8,4 L0,8 z" fill="#2e7d32"/>
  </marker>
  <marker id="arB" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
    <path d="M0,0 L8,4 L0,8 z" fill="#e67e22"/>
  </marker>
  <marker id="arY" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
    <path d="M0,0 L8,4 L0,8 z" fill="#f39c12"/>
  </marker>
</defs>

