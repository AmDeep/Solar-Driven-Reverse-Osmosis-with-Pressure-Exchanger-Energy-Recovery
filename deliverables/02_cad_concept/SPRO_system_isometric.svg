<line x1="635" y1="464" x2="665" y2="464" stroke="#1565c0" stroke-width="1" stroke-dasharray="5,3"/>
<text x="672" y="468" font-family="Arial" font-size="8.5" fill="#333">Container outline (dashed)</text>
<rect x="635" y="476" width="30" height="9" fill="#2e7d32" rx="1"/>
<text x="672" y="484" font-family="Arial" font-size="8.5" fill="#333">Battery bank</text>

